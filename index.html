<body>


    <script>
        let tShirtCount = 5;
        let capCount = 3;
        let tShirtPrice = 400;
        let capPrice = 150;

        let totalEarnings = (tShirtCount * tShirtCount) + (capCount * capPrice);
        console.log("Total Earnings: "+totalEarnings);

        console.log("After T-shirt price change");
        tShirtPrice = 450;
        totalEarnings = (tShirtCount * tShirtCount) + (capCount * capPrice);
        console.log("Total Earnings: "+totalEarnings);

    </script>
