<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact manager app</title>
    <style></style>
</head>
<body>
    <div class="title">
        <h1>Contact Manager App</h1>
    </div>
    <div id="container">
        <div id="contacts"></div>
        <button onclick="displayContacts()">Show Contacts</button>
    </div>

<script>
const contact1 = {
    name: "First User",
    phonenumber: 987654321,
    emailaddress: "firstuser@mail.com",

    getUserInfo() {
        return `INFO -
Name: ${this.name}
Phone Number: ${this.phonenumber}
Email: ${this.emailaddress}`;
    }
};

const contact2 = {
    name: "Second User",
    phonenumber: 987654321,
    emailaddress: "seconduser@mail.com",

    getUserInfo() {
        return `INFO -
Name: ${this.name}
Phone Number: ${this.phonenumber}
Email: ${this.emailaddress}`;
    }
};

function printContactInfo(contact) {
    document.getElementById("contacts").innerHTML += `
        <div class="card">
            <pre>${contact.getUserInfo()}</pre>
        </div>
    `;
}

function displayContacts() {
    const container = document.getElementById("contacts");
    container.innerHTML = "";

    printContactInfo(contact1);
    printContactInfo(contact2);
}

</script>
</body>
</html>
